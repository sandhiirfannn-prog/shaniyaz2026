<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 My Perfect Bouquet - Create & Share</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
                        radial-gradient(circle at 40% 40%, rgba(120,219,255,0.3) 0%, transparent 50%);
            z-index: -1;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 50px 20px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            margin-bottom: 40px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            background: linear-gradient(45deg, #ff6b9d, #c44569, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: 0 5px 20px rgba(255,107,157,0.4);
        }

        .header p {
            font-size: 1.3rem;
            color: #636e72;
            font-weight: 500;
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 500px;
            gap: 40px;
            margin-bottom: 40px;
        }

        /* Flower Selection Panel */
        .flower-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.15);
            height: fit-content;
        }

        .panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #e17055;
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .flowers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            max-height: 550px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .flower-option {
            aspect-ratio: 1;
            border-radius: 20px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        .flower-option:hover {
            transform: translateY(-12px) scale(1.03);
            border-color: #ff6b9d;
            box-shadow: 0 30px 70px rgba(255,107,157,0.4);
        }

        .flower-option.selected {
            border-color: #00cec9;
            box-shadow: 0 0 0 6px rgba(0,206,201,0.3), 0 25px 60px rgba(0,206,201,0.2);
            transform: scale(1.08);
        }

        .flower-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .flower-option:hover .flower-img {
            transform: scale(1.1);
        }

        .flower-name {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, rgba(0,0,0,0.85), rgba(0,0,0,0.7));
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 600;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        /* Bouquet Canvas */
        .bouquet-canvas {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 25px;
            padding: 50px 40px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.15);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .canvas-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #6c5ce7;
            margin-bottom: 30px;
        }

        .vase-container {
            position: relative;
            height: 450px;
            margin: 20px auto;
        }

        .vase {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 220px;
            height: 280px;
            background: linear-gradient(145deg, #e8c9a4 0%, #d4a574 100%);
            border-radius: 0 0 120px 120px;
            box-shadow: 
                0 25px 50px rgba(212,165,116,0.4),
                inset 0 -20px 40px rgba(255,255,255,0.3);
        }

        .bouquet-area {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 180px;
            height: 280px;
            pointer-events: none;
        }

        .bouquet-flower {
            position: absolute;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            animation: flowerFloat 5s ease-in-out infinite;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        @keyframes flowerFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-10px) rotate(3deg); }
            66% { transform: translateY(-5px) rotate(-2deg); }
        }

        .flower-count {
            font-size: 1.2rem;
            color: #636e72;
            margin-top: 20px;
            font-weight: 500;
        }

        .create-btn {
            background: linear-gradient(45deg, #00cec9, #55a3ff);
            color: white;
            border: none;
            padding: 20px 50px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 15px 40px rgba(0,206,201,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .create-btn:hover:not(:disabled) {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(0,206,201,0.6);
        }

        .create-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Share Modal */
        .share-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(15px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 25px;
            padding: 50px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            transform: scale(0.7);
            animation: modalScaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes modalScaleIn {
            to { transform: scale(1); }
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #e17055;
            margin-bottom: 20px;
        }

        .final-bouquet {
            width: 280px;
            height: 380px;
            margin: 20px auto;
            position: relative;
            background: linear-gradient(145deg, #f7dc6f 0%, #f39c12 100%);
            border-radius: 0 0 140px 140px;
            box-shadow: 
                0 35px 80px rgba(243,156,18,0.5),
                inset 0 -25px 50px rgba(255,255,255,0.4);
        }

        .share-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .share-btn {
            padding: 20px 15px;
            border-radius: 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .whatsapp-share { background: #25D366; }
        .instagram-share { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .facebook-share { background: #4267B2; }
        .download-share { 
            background: linear-gradient(45deg, #667eea, #764ba2); 
            grid-column: span 2;
            padding: 25px 15px;
            font-size: 1.2rem;
        }

        .share-btn:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .close-modal {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .close-modal:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
                gap: 30px;
            }
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 2.5rem; }
            .flowers-grid { grid-template-columns: repeat(2, 1fr); }
            .modal-content { padding: 30px 20px; }
        }

        /* Floating Hearts */
        .floating-heart {
            position: fixed;
            font-size: 24px;
            pointer-events: none;
            z-index: 999;
            animation: heartFloat 8s linear infinite;
        }

        @keyframes heartFloat {
            0% {
                transform: translateY(100vh) rotate(0deg) scale(0);
                opacity: 1;
            }
            10% {
                transform: translateY(90vh) rotate(180deg) scale(1);
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-20vh) rotate(720deg) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header
